<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Sparkals Tasks</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 48px 36px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo-wrapper {
      width: 100px;
      height: 100px;
      background: #1a1a2e;
      border-radius: 24px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .logo-wrapper img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
    }
    h1 {
      color: #1a1a2e;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      color: #666;
      font-size: 15px;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .status {
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      border-radius: 12px;
      padding: 14px 20px;
      color: #15803d;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .coming-soon {
      background: #f8f8ff;
      border: 1.5px solid #c7c7ff;
      border-radius: 12px;
      padding: 14px 20px;
      color: #3b37c8;
      font-size: 13px;
      line-height: 1.6;
    }
    .version {
      color: #aaa;
      font-size: 12px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrapper">
      <img src="icons/F_1_REZ_1.jpg" alt="Sparkals Tasks Logo" />
    </div>
    <h1>Sparkals Tasks</h1>
    <p>Your staff management app is being built. Big things coming!</p>
    <div class="status">✅ App is live and running</div>
    <div class="coming-soon">
      🔐 Staff login &nbsp;·&nbsp; ✅ Tasks &nbsp;·&nbsp; 📍 GPS tracking<br/>
      📊 Reports &nbsp;·&nbsp; 💬 Team chat &nbsp;·&nbsp; 🕐 Attendance
    </div>
    <div class="version">Version 0.1 — Foundation</div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('Service Worker registered'))
        .catch(err => console.log('SW registration failed:', err));
    }
  </script>
</body>
</html>
