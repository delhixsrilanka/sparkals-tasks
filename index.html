<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Sparkals Tasks</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/logo%20copfy.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
    .logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .logo img {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      object-fit: cover;
    }
    .app-name {
      color: #a78bfa;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .tagline {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(167,139,250,0.2);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">
    <img src="/icons/logo%20copfy.png" alt="Sparkals Tasks"
      onerror="this.style.display='none'; this.parentElement.innerHTML='⚡';" />
  </div>
  <div class="app-name">Sparkals Tasks</div>
  <div class="tagline">Staff Management App</div>
  <div class="spinner"></div>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    }
    // Redirect to login — Firebase will send to dashboard if already logged in
    setTimeout(function() {
      window.location.replace('login.html');
    }, 1200);
  </script>
</body>
</html>
