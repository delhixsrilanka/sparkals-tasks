<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6C63FF" />
  <title>Sparkals Tasks</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #6C63FF 0%, #3B37C8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 36px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #6C63FF, #3B37C8);
      border-radius: 20px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    h1 {
      color: #1a1a2e;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      color: #666;
      font-size: 15px;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .status {
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      border-radius: 12px;
      padding: 14px 20px;
      color: #15803d;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .version {
      color: #aaa;
      font-size: 12px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⚡</div>
    <h1>Sparkals Tasks</h1>
    <p>Your staff management app is being built. Big things coming!</p>
    <div class="status">✅ App is live and running</div>
    <p style="font-size:13px; color:#888; margin-bottom:0;">
      Staff login, tasks, attendance, GPS tracking and more — launching soon.
    </p>
    <div class="version">Version 0.1 — Foundation</div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('Service Worker registered'))
        .catch(err => console.log('SW registration failed:', err));
    }
  </script>
</body>
</html>Add hompage
