<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Sparkals Tasks — Login</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #ffffff;
      border-radius: 28px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }
    .logo-wrapper {
      width: 90px;
      height: 90px;
      background: #1a1a2e;
      border-radius: 22px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .logo-wrapper img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
    }
    .welcome-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .welcome-subtitle {
      text-align: center;
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 8px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      font-size: 16px;
      color: #1a1a2e;
      background: #f5f5f5;
      transition: border-color 0.2s;
      outline: none;
    }
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #1a1a2e;
      background: #fff;
    }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 48px; }
    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      color: #888;
      background: none;
      border: none;
      padding: 0;
    }
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn-primary:active { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .forgot-password {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #888;
    }
    .forgot-link {
      color: #1a1a2e;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
    }
    .error-msg {
      background: #fff0f0;
      border: 1.5px solid #fca5a5;
      border-radius: 10px;
      padding: 12px 14px;
      color: #dc2626;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .success-msg {
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      border-radius: 10px;
      padding: 12px 14px;
      color: #15803d;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #bbb;
      margin-top: 24px;
    }
    .screen { display: none; }
    .screen.active { display: block; }
    .back-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 20px;
      padding: 0;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="logo-wrapper">
    <img src="/icons/logo%20copfy.png" alt="Sparkals Tasks"
      onerror="this.style.display='none'; this.parentElement.innerHTML='⚡';" />
  </div>
  <div class="welcome-title">Welcome to Sparkals Tasks</div>
  <div class="welcome-subtitle">Your smart staff management app.<br/>Sign in to get started.</div>

  <div class="screen active" id="screen-login">
    <div class="form-group">
      <label class="form-label">Work Email Address</label>
      <input type="email" id="email-input" placeholder="yourname@company.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="password-wrapper">
        <input type="password" id="password-input" placeholder="Enter your password"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter') loginStaff()" />
        <button class="toggle-password" onclick="togglePassword()" type="button">👁️</button>
      </div>
    </div>
    <button class="btn-primary" id="login-btn" onclick="loginStaff()">Sign In →</button>
    <div class="error-msg" id="login-error"></div>
    <div class="success-msg" id="login-success"></div>
    <div class="forgot-password">
      Forgot your password?
      <span class="forgot-link" onclick="showForgotScreen()">Reset it here</span>
    </div>
    <div class="footer-note">🔐 Secured by Firebase Authentication</div>
  </div>

  <div class="screen" id="screen-forgot">
    <button class="back-btn" onclick="showLoginScreen()">← Back to login</button>
    <div class="form-group">
      <label class="form-label">Enter your work email to reset password</label>
      <input type="email" id="reset-email-input" placeholder="yourname@company.com" />
    </div>
    <button class="btn-primary" id="reset-btn" onclick="resetPassword()">Send Reset Link →</button>
    <div class="error-msg" id="reset-error"></div>
    <div class="success-msg" id="reset-success"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    sendPasswordResetEmail,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
  apiKey: "AIzaSyDNwQYXcwZrAh4cTfRyhOVk_pRod9p4CRM",
  authDomain: "sparkals-tasks-app.firebaseapp.com",
  projectId: "sparkals-tasks-app",
  storageBucket: "sparkals-tasks-app.firebasestorage.app",
  messagingSenderId: "147179987231",
  appId: "1:147179987231:web:c6ffa484f33a2ca420d02a",
  measurementId: "G-9QF8EWRW3E"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // YOUR ADMIN EMAIL ADDRESSES
  const ADMIN_EMAILS = [
    'sandeepgemologist@gmail.com',
    'sparkals.design@gmail.com'
  ];

  function isAdmin(email) {
    if (!email) return false;
    return ADMIN_EMAILS.includes(email.toLowerCase().trim());
  }

  // If already logged in — skip login screen
  onAuthStateChanged(auth, (user) => {
    if (user) {
      console.log('Already logged in:', user.email);
      if (isAdmin(user.email)) {
        console.log('✅ Admin — going to admin.html');
        window.location.replace('admin.html');
      } else {
        console.log('Staff — going to dashboard.html');
        window.location.replace('dashboard.html');
      }
    }
  });

  // Login
  window.loginStaff = async function() {
    const email = document.getElementById('email-input').value.trim().toLowerCase();
    const password = document.getElementById('password-input').value;
    const errorDiv = document.getElementById('login-error');
    const successDiv = document.getElementById('login-success');
    const btn = document.getElementById('login-btn');

    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';

    if (!email || !email.includes('@')) {
      errorDiv.textContent = '⚠️ Please enter a valid email address';
      errorDiv.style.display = 'block';
      return;
    }
    if (!password || password.length < 6) {
      errorDiv.textContent = '⚠️ Please enter your password';
      errorDiv.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in...';

    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;
      console.log('Logged in as:', user.email);

      successDiv.textContent = '✅ Login successful! Loading your dashboard...';
      successDiv.style.display = 'block';

      setTimeout(() => {
        if (isAdmin(user.email)) {
          console.log('✅ Admin redirect → admin.html');
          window.location.replace('admin.html');
        } else {
          console.log('Staff redirect → dashboard.html');
          window.location.replace('dashboard.html');
        }
      }, 1500);

    } catch (error) {
      btn.disabled = false;
      btn.innerHTML = 'Sign In →';
      if (error.code === 'auth/user-not-found' ||
          error.code === 'auth/wrong-password' ||
          error.code === 'auth/invalid-credential') {
        errorDiv.textContent = '⚠️ Incorrect email or password. Please try again.';
      } else if (error.code === 'auth/too-many-requests') {
        errorDiv.textContent = '⚠️ Too many attempts. Please try again in a few minutes.';
      } else {
        errorDiv.textContent = '⚠️ Login failed. Please try again.';
      }
      errorDiv.style.display = 'block';
    }
  };

  // Reset password
  window.resetPassword = async function() {
    const email = document.getElementById('reset-email-input').value.trim();
    const errorDiv = document.getElementById('reset-error');
    const successDiv = document.getElementById('reset-success');
    const btn = document.getElementById('reset-btn');
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    if (!email || !email.includes('@')) {
      errorDiv.textContent = '⚠️ Please enter your email address';
      errorDiv.style.display = 'block';
      return;
    }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Sending...';
    try {
      await sendPasswordResetEmail(auth, email);
      successDiv.textContent = '✅ Reset link sent! Check your email inbox.';
      successDiv.style.display = 'block';
      btn.innerHTML = 'Send Reset Link →';
      btn.disabled = false;
    } catch (error) {
      errorDiv.textContent = '⚠️ Could not send reset email.';
      errorDiv.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Send Reset Link →';
    }
  };

  window.togglePassword = function() {
    const input = document.getElementById('password-input');
    input.type = input.type === 'password' ? 'text' : 'password';
  };
  window.showForgotScreen = function() {
    document.getElementById('screen-login').classList.remove('active');
    document.getElementById('screen-forgot').classList.add('active');
  };
  window.showLoginScreen = function() {
    document.getElementById('screen-forgot').classList.remove('active');
    document.getElementById('screen-login').classList.add('active');
  };
</script>
</body>
</html>
